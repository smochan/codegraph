name: codegraph PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install codegraph (PR head)
        run: pip install -e .

      - name: Build baseline graph from main
        run: |
          set -euxo pipefail
          BASELINE_DIR="${RUNNER_TEMP}/cg-baseline-checkout"
          rm -rf "$BASELINE_DIR"
          git worktree add "$BASELINE_DIR" origin/main
          (
            cd "$BASELINE_DIR"
            pip install -e . --quiet
            codegraph build --no-incremental
            codegraph baseline save --output "$GITHUB_WORKSPACE/.codegraph/baseline.db"
          )
          if [ ! -f .codegraph/baseline.db ]; then
            echo "BASELINE_MISSING=1" >> "$GITHUB_ENV"
            echo "::warning::No baseline could be saved from main; running first-time review."
          fi

      - name: Build PR head graph
        run: codegraph build --no-incremental

      - name: Run codegraph review
        run: |
          set -uo pipefail
          if [ -n "${BASELINE_MISSING:-}" ]; then
            cat > review.md <<'EOF'
          ## codegraph PR review

          No baseline graph from `main` was available for this run, so a
          full diff review was skipped. The PR head was still parsed
          successfully — codegraph review will activate from the next PR.
          EOF
            exit 0
          fi
          set +e
          codegraph review \
            --format markdown \
            --output review.md \
            --fail-on high \
            --baseline .codegraph/baseline.db
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "REVIEW_FAILED=1" >> "$GITHUB_ENV"
          fi

      - name: Wrap review in comment template
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          {
            echo "## codegraph PR review"
            echo
            echo "<details open>"
            echo "<summary><b>Diff vs main</b> · severity &le; <code>high</code></summary>"
            echo
            cat review.md
            echo
            echo "</details>"
            echo
            echo "<sub>Triggered by codegraph CI · <a href=\"${RUN_URL}\">last run</a></sub>"
          } > comment.md

      - name: Write findings to job summary
        # Always renders the review on the run page so fork-PR contributors
        # (who don't get a PR comment) can see the result without downloading
        # an artifact.
        if: always()
        run: |
          set -uo pipefail
          if [ -f review.md ]; then
            {
              echo "# codegraph PR review"
              echo
              if [ "${REVIEW_FAILED:-}" = "1" ]; then
                echo "**Status:** failed (findings exceed \`--fail-on high\`)"
              else
                echo "**Status:** passed"
              fi
              echo
              echo "How to reproduce locally before pushing:"
              echo
              echo '```bash'
              echo "git fetch origin main"
              echo "./scripts/test-pr-review-locally.sh"
              echo '```'
              echo
              echo "---"
              echo
              cat review.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::review.md was not produced; check earlier steps."
          fi

      - name: Post or update PR comment
        # Posting needs a write-scoped GITHUB_TOKEN, which GitHub does NOT
        # grant on PRs from a fork. Skip on fork PRs; the job summary above
        # already shows the findings on the run page.
        if: github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: comment.md
          edit-mode: replace
          comment-tag: codegraph-review

      - name: Note for fork-PR contributors
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::notice::PR is from a fork — full review is in the job summary above and the codegraph-review artifact below. Run ./scripts/test-pr-review-locally.sh to reproduce."

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codegraph-review
          path: |
            review.md
            comment.md
            .codegraph/graph.db
          retention-days: 7

      - name: Fail if findings exceed threshold
        if: env.REVIEW_FAILED == '1'
        run: |
          echo "::error::codegraph review found high-or-critical findings. See the job summary above for the full report."
          exit 1
