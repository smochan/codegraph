<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>codegraph</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter var', 'Inter', 'system-ui', 'sans-serif'] },
      colors: {
        ink: { 950:'#070b16', 900:'#0b1220', 800:'#0f172a', 700:'#131c2e',
               600:'#1a2540', 500:'#243049', 400:'#334155', 300:'#475569',
               200:'#94a3b8', 100:'#cbd5e1', 50:'#e2e8f0' },
        brand: { 500:'#818cf8', 400:'#a5b4fc', 600:'#6366f1' },
        accent: { cyan:'#22d3ee', emerald:'#34d399', amber:'#fcd34d',
                  rose:'#fb7185', violet:'#a78bfa' },
      },
      boxShadow: {
        'card': '0 1px 0 0 rgba(255,255,255,0.04) inset, 0 8px 24px -12px rgba(0,0,0,0.6)',
        'glow': '0 0 0 1px rgba(129,140,248,0.4), 0 0 30px -10px rgba(129,140,248,0.5)',
      },
    }
  }
};
</script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script src="https://unpkg.com/lucide@0.414.0"></script>
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-ink-950 text-ink-50 font-sans antialiased min-h-screen">
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 shrink-0 border-r border-ink-500 bg-ink-900 flex flex-col sticky top-0 h-screen">
    <div class="px-5 py-5 border-b border-ink-500 flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-accent-cyan flex items-center justify-center text-ink-950 font-bold text-sm">cg</div>
      <div>
        <div class="font-semibold text-sm">codegraph</div>
        <div class="text-[11px] text-ink-200" id="repo-name">loading...</div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto" id="nav"></nav>
    <div class="p-3 border-t border-ink-500 space-y-2">
      <button id="rebuild-btn" class="w-full flex items-center justify-center gap-2 rounded-md bg-ink-700 hover:bg-ink-600 text-sm py-2 transition border border-ink-500 hover:border-brand-500">
        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i><span>Rebuild</span>
      </button>
      <div class="text-[10px] text-ink-200 text-center" id="last-built"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-w-0 flex flex-col">
    <header class="sticky top-0 z-10 border-b border-ink-500 bg-ink-900/80 backdrop-blur px-8 py-4 flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-wider text-ink-200" id="crumb">Dashboard</div>
        <h1 class="text-lg font-semibold mt-0.5" id="page-title">Overview</h1>
      </div>
      <div class="flex items-center gap-3 text-xs text-ink-200" id="header-stats"></div>
    </header>
    <div class="flex-1 overflow-y-auto" id="view-host">
      <div class="flex items-center justify-center h-full">
        <div class="text-ink-200 text-sm">Loading data...</div>
      </div>
    </div>
  </main>
</div>
<div id="tooltip" class="pointer-events-none fixed opacity-0 transition-opacity z-50 bg-ink-700 border border-ink-500 rounded-md px-3 py-2 text-xs shadow-card max-w-sm"></div>
<div id="toast-host" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
<script src="/static/app.js"></script>
</body>
</html>
